function obtenerPeriodos() {
  if (granularidad === 'por_dia') {
    return AGRUPACIONES.por_dia || [];
  } else if (granularidad === 'por_ciclo') {
    return (AGRUPACIONES.por_ciclo || []).map(([p, f]) => ({ periodo: p, fechas: Object.keys(f) }));
  } else if (granularidad === 'por_semana') {
    return (AGRUPACIONES.por_semana || []).map(([p, f]) => ({ periodo: p, fechas: Object.keys(f) }));
  } else if (granularidad === 'por_mes') {
    return (AGRUPACIONES.por_mes || []).map(([p, f]) => ({ periodo: p, fechas: Object.keys(f) }));
  } else if (granularidad === 'por_trimestre') {
    return (AGRUPACIONES.por_trimestre || []).map(([p, f]) => ({ periodo: p, fechas: Object.keys(f) }));
  } else if (granularidad === 'por_ano') {
    return (AGRUPACIONES.por_ano || []).map(([p, f]) => ({ periodo: p, fechas: Object.keys(f) }));
  } else if (granularidad === 'personalizado') {
    const ini = document.getElementById('fecha-inicio').value;
    const fin = document.getElementById('fecha-fin').value;
    if (!ini || !fin) return [];
    const dini = new Date(ini);
    const dfin = new Date(fin);
    return DATOS.fechas.filter(f => {
      const d = new Date(f);
      return d >= dini && d <= dfin;
    }).map(f => ({ periodo: f, fechas: [f] }));
  }
  return [];
}

          tc += p.total;
          tcalf += p.calificados;
        }
      });
    });
    
    metricas['Total Creados'].push(tc);
    metricas['Calificados'].push(tcalf);
    metricas['No Calif.'].push(tc - tcalf);
    metricas['% Calif.'].push(tc > 0 ? (tcalf / tc * 100).toFixed(1) : '0');
    metricas['CVR'].push(tc > 0 ? (tcalf / tc).toFixed(4) : '0');
  });
  
  Object.entries(metricas).forEach(([met, vals]) => {
    const fila = document.createElement('tr');
    fila.className = 'resumen-row';
    let html = `<td class="label-cell">${met}</td>`;
    let suma = 0;
    vals.forEach(v => {
      const n = parseFloat(v);
      suma += n;
      const clase = met.includes('%') || met === 'CVR' ? 'numero porcentaje' : 'numero';
      html += `<td class="${clase}">${v}</td>`;
    });
    const esPorc = met.includes('%') || met === 'CVR';
    html += `<td>${esPorc ? (suma / vals.length).toFixed(met === 'CVR' ? 4 : 1) : Math.round(suma)}</td>`;
    fila.innerHTML = html;
    tbody.appendChild(fila);
  });
  
  // TABLA DESGLOSE
  const thead2 = document.getElementById('thead');
  const tbody2 = document.getElementById('tbody');
  thead2.innerHTML = '';
  tbody2.innerHTML = '';
  
  let headerDet = '<tr><th style="min-width: 160px;">Estado</th>';
  labels.forEach(l => { headerDet += `<th>${l}</th>`; });
  headerDet += '<th>TOTAL</th></tr>';
  thead2.innerHTML = headerDet;
  
  canalesAMostrar.forEach(c => {
    const key = `${fuente}|${c}`;
    if (!DATOS.data[key]) return;
    
    const filaTit = document.createElement('tr');
    filaTit.className = 'subfuente-header';
    let htmlTit = `<td><strong>${c}</strong></td>`;
    htmlTit += `<td colspan="${labels.length + 1}"></td>`;
    filaTit.innerHTML = htmlTit;
    tbody2.appendChild(filaTit);
    
    Object.keys(DATOS.data[key]).sort().forEach(estado => {
      const fila = document.createElement('tr');
      let html = `<td class="label-cell">${estado}</td>`;
      let suma = 0;
      
      (granularidad === 'por_dia' ? periodos : periodos.map(p => p.fechas)).forEach(periodo => {
        const fechas = Array.isArray(periodo) ? periodo : [periodo];
        let sumaPer = 0;
        fechas.forEach(fecha => {
          const idx = DATOS.fechas.indexOf(fecha);
          if (idx >= 0) {
            sumaPer += DATOS.data[key][estado][idx] || 0;
          }
        });
        suma += sumaPer;
        const clase = estado === 'Calificado' ? 'numero calificado' : '';
        html += `<td class="${clase}">${sumaPer}</td>`;
      });
      
      html += `<td style="font-weight: 600; color: #fff;">${suma}</td>`;
      fila.innerHTML = html;
      tbody2.appendChild(fila);
    });
    
    const filaTotal = document.createElement('tr');
    filaTotal.className = 'total-row';
    let htmlTotal = '<td class="label-cell"><strong>TOTAL</strong></td>';
    
    (granularidad === 'por_dia' ? periodos : periodos.map(p => p.fechas)).forEach(periodo => {
      const fechas = Array.isArray(periodo) ? periodo : [periodo];
      let suma = 0;
      fechas.forEach(fecha => {
        const idx = DATOS.fechas.indexOf(fecha);
        if (idx >= 0) {
          Object.keys(DATOS.data[key]).forEach(estado => {
            suma += DATOS.data[key][estado][idx] || 0;
          });
        }
      });
      htmlTotal += `<td>${suma}</td>`;
    });
    
    let totalGen = 0;
    (granularidad === 'por_dia' ? periodos : periodos.map(p => p.fechas)).forEach(periodo => {
      const fechas = Array.isArray(periodo) ? periodo : [periodo];
      fechas.forEach(fecha => {
        const idx = DATOS.fechas.indexOf(fecha);
        if (idx >= 0) {
          Object.keys(DATOS.data[key]).forEach(estado => {
            totalGen += DATOS.data[key][estado][idx] || 0;
          });
        }
      });
    });
    
    htmlTotal += `<td>${totalGen}</td>`;
    filaTotal.innerHTML = htmlTotal;
    tbody2.appendChild(filaTotal);
  });
}

function actualizarDashboard() {
  construirTablas();
}

function resetear() {
  document.getElementById('granularidad').value = 'por_dia';
  document.getElementById('fuente').value = '';
  document.getElementById('canal').value = '';
  document.getElementById('canal').disabled = true;
  document.getElementById('fecha-inicio').value = '';
  document.getElementById('fecha-fin').value = '';
  cambiarGranularidad();
}

document.addEventListener('DOMContentLoaded', init);
