      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      background: #0f1419;
    }

    th {
      background: #1a1f2e;
      padding: 12px 8px;
      text-align: left;
      font-weight: 600;
      color: #b0b0b0;
      border-bottom: 1px solid #333;
      border-right: 1px solid #333;
      min-width: 60px;
      white-space: nowrap;

    th:last-child {
      border-right: none;
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #222;
      border-right: 1px solid #222;
      text-align: center;
    }

    td:last-child {
      border-right: none;
    }

    tr:hover {
      background: #16202e;
    }

    .estado-label {
      text-align: left;
      font-weight: 500;
      color: #e0e0e0;
      min-width: 120px;
      padding-left: 12px;
    }

    .cell-calificado {
      color: #4fa89a;
      font-weight: 600;
    }

    .cell-rechazado {
      color: #e89070;
      font-weight: 600;
    }

    .cell-pendiente {
      color: #5a9fd4;
      font-weight: 600;
    }

    .total-row {
      background: #1a1f2e;
      font-weight: 600;
      border-top: 2px solid #333;
    }

    .total-row td {
      color: #fff;
      border-bottom: none;
    }

    .date-header {
      writing-mode: horizontal-tb;
      font-size: 11px;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      table { font-size: 11px; }
      th, td { padding: 6px 4px; }
      .estado-label { min-width: 80px; padding-left: 6px; }
    }
  </style>
</head>

    }

};

let datosFiltrados = DATOS_BRUTOS;
const estados = ['Calificado', 'Rechazado', 'Pendiente'];

function construirTabla() {
  const fuente = document.getElementById('filtro-fuente').value;
  const fuentes = fuente ? { [fuente]: DATOS_BRUTOS.fuentes[fuente] } : DATOS_BRUTOS.fuentes;
  
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // Header con fechas
  let headerHTML = '<tr><th style="min-width: 120px;">Estado</th>';
  DATOS_BRUTOS.fechas.forEach(fecha => {
    const [año, mes, día] = fecha.split('-');
    const label = `${día}/${mes}`;
    headerHTML += `<th class="date-header">${label}</th>`;
  });
  headerHTML += '</tr>';
  thead.innerHTML = headerHTML;

  // Filas por estado
  Object.entries(fuentes).forEach(([nombreFuente, dataFuente]) => {
    // Título de fuente
    const filaTítulo = document.createElement('tr');
    filaTítulo.style.background = '#1a1f2e';
    filaTítulo.style.borderTop = '2px solid #333';
    let htmlTítulo = `<td colspan="${DATOS_BRUTOS.fechas.length + 1}" style="text-align: left; font-weight: 600; padding: 12px;">${nombreFuente}</td>`;
    filaTítulo.innerHTML = htmlTítulo;
    tbody.appendChild(filaTítulo);

    // Filas por estado
    estados.forEach(estado => {
      const fila = document.createElement('tr');
      let html = `<td class="estado-label">${estado}</td>`;
      
      dataFuente[estado].forEach((valor, idx) => {
        let clase = 'cell-pendiente';
        if (estado === 'Calificado') clase = 'cell-calificado';
        else if (estado === 'Rechazado') clase = 'cell-rechazado';
        
        html += `<td class="${clase}">${valor}</td>`;
      });
      
      fila.innerHTML = html;
      tbody.appendChild(fila);
    });

    // Fila de total por fuente
    const filaTotal = document.createElement('tr');
    filaTotal.className = 'total-row';
    let htmlTotal = '<td class="estado-label">TOTAL</td>';
    
    for (let i = 0; i < DATOS_BRUTOS.fechas.length; i++) {
      let suma = 0;
      estados.forEach(estado => {
        suma += dataFuente[estado][i];
      });
      htmlTotal += `<td>${suma}</td>`;
    }
    
    filaTotal.innerHTML = htmlTotal;
    tbody.appendChild(filaTotal);
  });
}

function actualizarDashboard() {
  construirTabla();
}

function resetear() {
  document.getElementById('filtro-fuente').value = '';
  construirTabla();
}

document.addEventListener('DOMContentLoaded', construirTabla);
  </script>
</body>
</html>
