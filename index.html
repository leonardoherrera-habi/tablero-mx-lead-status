let datosFiltrados = DATOS_BRUTOS;

function inicializar() {
  // Llenar selector de fuentes
  const selectFuente = document.getElementById('fuente');
  Object.keys(DATOS_BRUTOS.fuentes || {}).forEach(fuente => {
    const option = document.createElement('option');
    option.value = fuente;
    option.textContent = fuente;
    selectFuente.appendChild(option);
  });
}

function cambiarFuente() {
  const fuente = document.getElementById('fuente').value;
  const selectSubfuente = document.getElementById('subfuente');
  
  selectSubfuente.innerHTML = '';
  
  if (!fuente) {
    selectSubfuente.disabled = true;
    selectSubfuente.innerHTML = '<option value="">-- Primero elige fuente --</option>';
    return;
  }
  
  selectSubfuente.disabled = false;
  const option0 = document.createElement('option');
  option0.value = '';
  option0.textContent = '-- Todas las sub-fuentes --';
  selectSubfuente.appendChild(option0);
  
  (DATOS_BRUTOS.fuentes[fuente] || []).forEach(subfuente => {
    const option = document.createElement('option');
    option.value = subfuente;
    option.textContent = subfuente;
    selectSubfuente.appendChild(option);
  });
  
  actualizarDashboard();
}

function construirTabla() {
  const fuente = document.getElementById('fuente').value;
  const subfuente = document.getElementById('subfuente').value;
  
  if (!fuente) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="100" style="text-align: center; padding: 40px;">Selecciona una fuente para comenzar</td></tr>';
    document.getElementById('info-mensaje').style.display = 'none';
    return;
  }
  
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  const infoDiv = document.getElementById('info-mensaje');
  
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // Header
  let headerHTML = '<tr><th style="min-width: 160px;">Estado</th>';
  DATOS_BRUTOS.fechas.forEach(fecha => {
    const [año, mes, día] = fecha.split('-');
    const label = `${día}/${mes}`;
    headerHTML += `<th class="date-header">${label}</th>`;
  });
  headerHTML += '<th style="min-width: 60px;">TOTAL</th></tr>';
  thead.innerHTML = headerHTML;

  // Determinar qué sub-fuentes mostrar
  const subfuentesAMostrar = subfuente 
    ? [subfuente] 
    : (DATOS_BRUTOS.fuentes[fuente] || []);

  // Mensaje
  if (subfuentesAMostrar.length === 1) {
    infoDiv.textContent = `📊 ${fuente} > ${subfuentesAMostrar[0]}`;
  } else {
    infoDiv.textContent = `📊 ${fuente} > Todas (${subfuentesAMostrar.length} sub-fuentes)`;
  }
  infoDiv.style.display = 'block';

  // Filas por sub-fuente y estado
  subfuentesAMostrar.forEach(sf => {
    const key = `${fuente}|${sf}`;
    if (!DATOS_BRUTOS.data[key]) return;

    // Header de sub-fuente
    const filaTítulo = document.createElement('tr');
    filaTítulo.className = 'subfuente-header';
    let htmlTítulo = `<td><strong>${sf}</strong></td>`;
    htmlTítulo += `<td colspan="${DATOS_BRUTOS.fechas.length + 1}"></td>`;
    filaTítulo.innerHTML = htmlTítulo;
    tbody.appendChild(filaTítulo);

    // Filas por estado
    const estados = Object.keys(DATOS_BRUTOS.data[key]).sort();
    estados.forEach(estado => {
      const fila = document.createElement('tr');
      let clase = 'rechazado';
      if (estado === 'Calificado') clase = 'calificado';
      
      let html = `<td class="estado-label ${clase}">${estado}</td>`;
      let sumaFila = 0;
      
      const dataEstado = DATOS_BRUTOS.data[key][estado];
      DATOS_BRUTOS.fechas.forEach((fecha, idx) => {
        const valor = dataEstado[idx] || 0;
        sumaFila += valor;
        const numClase = estado === 'Calificado' ? 'calificado' : '';
        html += `<td class="numero ${numClase}">${valor}</td>`;
      });
      
      html += `<td class="numero" style="font-weight: 600; color: #fff;">${sumaFila}</td>`;
      fila.innerHTML = html;
      tbody.appendChild(fila);
    });

    // Total por sub-fuente
    const filaTotal = document.createElement('tr');
    filaTotal.className = 'total-row';
    let htmlTotal = '<td class="estado-label"><strong>TOTAL</strong></td>';
    
    for (let i = 0; i < DATOS_BRUTOS.fechas.length; i++) {
      let suma = 0;
      Object.keys(DATOS_BRUTOS.data[key]).forEach(estado => {
        suma += DATOS_BRUTOS.data[key][estado][i] || 0;
      });
      htmlTotal += `<td>${suma}</td>`;
    }
    
    // Total general
    let totalGeneral = 0;
    DATOS_BRUTOS.fechas.forEach((fecha, idx) => {
      Object.keys(DATOS_BRUTOS.data[key]).forEach(estado => {
        totalGeneral += DATOS_BRUTOS.data[key][estado][idx] || 0;
      });
    });
    
    htmlTotal += `<td>${totalGeneral}</td>`;
    filaTotal.innerHTML = htmlTotal;
    tbody.appendChild(filaTotal);
  });
}

function actualizarDashboard() {
  construirTabla();
}

function resetear() {
  document.getElementById('fuente').value = '';
  document.getElementById('subfuente').value = '';
  document.getElementById('subfuente').disabled = true;
  construirTabla();
}

document.addEventListener('DOMContentLoaded', () => {
  inicializar();
});
