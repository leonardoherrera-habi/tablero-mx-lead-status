let granularidadActual = 'por_dia';
let periodosActuales = [];

function inicializar() {
  const selectFuente = document.getElementById('fuente');
  Object.keys(DATOS_BRUTOS.fuentes || {}).forEach(fuente => {
    const option = document.createElement('option');
    option.value = fuente;
    option.textContent = fuente;
    selectFuente.appendChild(option);
  });
  
  cambiarGranularidad();
}

function cambiarGranularidad() {
  granularidadActual = document.getElementById('granularidad').value;
  
  if (granularidadActual === 'por_dia') {
    periodosActuales = AGRUPACIONES.por_dia || [];
  } else if (granularidadActual === 'por_ciclo') {
    periodosActuales = (AGRUPACIONES.por_ciclo || []).map(([periodo, fechas]) => ({ periodo, fechas: Object.keys(fechas) }));
  } else if (granularidadActual === 'por_semana') {
    periodosActuales = (AGRUPACIONES.por_semana || []).map(([periodo, fechas]) => ({ periodo, fechas: Object.keys(fechas) }));
  } else if (granularidadActual === 'por_mes') {
    periodosActuales = (AGRUPACIONES.por_mes || []).map(([periodo, fechas]) => ({ periodo, fechas: Object.keys(fechas) }));
  } else if (granularidadActual === 'por_trimestre') {
    periodosActuales = (AGRUPACIONES.por_trimestre || []).map(([periodo, fechas]) => ({ periodo, fechas: Object.keys(fechas) }));
  } else if (granularidadActual === 'por_ano') {
    periodosActuales = (AGRUPACIONES.por_ano || []).map(([periodo, fechas]) => ({ periodo, fechas: Object.keys(fechas) }));
  }
  
  actualizarDashboard();
}

function cambiarFuente() {
  const fuente = document.getElementById('fuente').value;
  const selectSubfuente = document.getElementById('subfuente');
  
  selectSubfuente.innerHTML = '';
  
  if (!fuente) {
    selectSubfuente.disabled = true;
    selectSubfuente.innerHTML = '<option value="">-- Primero elige fuente --</option>';
    return;
  }
  
  selectSubfuente.disabled = false;
  const option0 = document.createElement('option');
  option0.value = '';
  option0.textContent = '-- Todas las sub-fuentes --';
  selectSubfuente.appendChild(option0);
  
  (DATOS_BRUTOS.fuentes[fuente] || []).forEach(subfuente => {
    const option = document.createElement('option');
    option.value = subfuente;
    option.textContent = subfuente;
    selectSubfuente.appendChild(option);
  });
  
  actualizarDashboard();
}

function construirTablas() {
  const fuente = document.getElementById('fuente').value;
  const subfuente = document.getElementById('subfuente').value;
  
  if (!fuente) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="100" style="text-align: center; padding: 40px;">Selecciona una fuente para comenzar</td></tr>';
    document.getElementById('info-mensaje').style.display = 'none';
    return;
  }
  
  // --- TABLA RESUMEN ---
  const theadResumen = document.getElementById('thead-resumen');
  const tbodyResumen = document.getElementById('tbody-resumen');
  theadResumen.innerHTML = '';
  tbodyResumen.innerHTML = '';

  let headerResumen = '<tr><th style="min-width: 160px;">Métrica</th>';
  
  let periodosLabels = [];
  if (granularidadActual === 'por_dia') {
    periodosLabels = periodosActuales.map(f => {
      const [año, mes, día] = f.split('-');
      return `${día}/${mes}`;
    });
  } else {
    periodosLabels = periodosActuales.map(p => p.periodo || p);
  }
  
  periodosLabels.forEach(label => {
    headerResumen += `<th class="date-header">${label}</th>`;
  });
  headerResumen += '<th style="min-width: 60px;">TOTAL</th></tr>';
  theadResumen.innerHTML = headerResumen;

  const subfuentesAMostrar = subfuente 
    ? [subfuente] 
    : (DATOS_BRUTOS.fuentes[fuente] || []);

  const infoDiv = document.getElementById('info-mensaje');
  if (subfuentesAMostrar.length === 1) {
    infoDiv.textContent = `📊 ${fuente} > ${subfuentesAMostrar[0]} | Granularidad: ${document.getElementById('granularidad').value.replace('por_', '')}`;
  } else {
    infoDiv.textContent = `📊 ${fuente} > Todas (${subfuentesAMostrar.length} sub-fuentes) | Granularidad: ${document.getElementById('granularidad').value.replace('por_', '')}`;
  }
  infoDiv.style.display = 'block';

  // Calcular agregados
  const metricas = {
    'Total Creados': [],
    'Calificados': [],
    'No Calificados': [],
    '% Calificados': [],
    'CVR': []
  };

  let periodosParaTabla = [];
  if (granularidadActual === 'por_dia') {
    periodosParaTabla = periodosActuales;
  } else {
    periodosParaTabla = periodosActuales.map(p => p.fechas);
  }

  periodosParaTabla.forEach(periodo => {
    const fechasDelPeriodo = Array.isArray(periodo) ? periodo : [periodo];
    
    let totalCreados = 0, totalCalif = 0;
    
    fechasDelPeriodo.forEach(fecha => {
      subfuentesAMostrar.forEach(sf => {
        const key = `${fuente}|${sf}`;
        if (DATOS_BRUTOS.porcentajes[key] && DATOS_BRUTOS.porcentajes[key][fecha]) {
          const p = DATOS_BRUTOS.porcentajes[key][fecha];
          totalCreados += p.total;
          totalCalif += p.calificados;
        }
      });
    });

    const pctCalif = totalCreados > 0 ? (totalCalif / totalCreados * 100) : 0;
    const cvr = totalCreados > 0 ? (totalCalif / totalCreados) : 0;

    metricas['Total Creados'].push(totalCreados);
    metricas['Calificados'].push(totalCalif);
    metricas['No Calificados'].push(totalCreados - totalCalif);
    metricas['% Calificados'].push(pctCalif.toFixed(1));
    metricas['CVR'].push(cvr.toFixed(4));
  });

  Object.entries(metricas).forEach(([metrica, valores]) => {
    const fila = document.createElement('tr');
    fila.className = 'resumen-row';
    let html = `<td class="label-cell">${metrica}</td>`;
    
    let sumaTotal = 0;
    valores.forEach(v => {
      const num = parseFloat(v);
      sumaTotal += num;
      const esPorc = metrica.includes('%') || metrica === 'CVR';
      const clase = esPorc ? 'numero porcentaje' : 'numero';
      const valor = esPorc ? v : Math.round(num);
      html += `<td class="${clase}">${valor}</td>`;
    });

    const esPorcentaje = metrica.includes('%') || metrica === 'CVR';
    html += `<td style="font-weight: 600; color: #fff;">${esPorcentaje ? (sumaTotal / valores.length).toFixed(metrica === 'CVR' ? 4 : 1) : Math.round(sumaTotal)}</td>`;
    fila.innerHTML = html;
    tbodyResumen.appendChild(fila);
  });

  // --- TABLA DETALLADA ---
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  let headerHTML = '<tr><th style="min-width: 160px;">Estado</th>';
  periodosLabels.forEach(label => {
    headerHTML += `<th class="date-header">${label}</th>`;
  });
  headerHTML += '<th style="min-width: 60px;">TOTAL</th></tr>';
  thead.innerHTML = headerHTML;

  subfuentesAMostrar.forEach(sf => {
    const key = `${fuente}|${sf}`;
    if (!DATOS_BRUTOS.data[key]) return;

    const filaTítulo = document.createElement('tr');
    filaTítulo.className = 'subfuente-header';
    let htmlTítulo = `<td><strong>${sf}</strong></td>`;
    htmlTítulo += `<td colspan="${periodosLabels.length + 1}"></td>`;
    filaTítulo.innerHTML = htmlTítulo;
    tbody.appendChild(filaTítulo);

    const estados = Object.keys(DATOS_BRUTOS.data[key]).sort();
    estados.forEach(estado => {
      const fila = document.createElement('tr');
      let clase = 'rechazado';
      if (estado === 'Calificado') clase = 'calificado';
      
      let html = `<td class="label-cell ${clase}">${estado}</td>`;
      let sumaFila = 0;
      
      const dataEstado = DATOS_BRUTOS.data[key][estado];
      periodosParaTabla.forEach((periodo) => {
        const fechasDelPeriodo = Array.isArray(periodo) ? periodo : [periodo];
        let sumaPeriodo = 0;
        
        fechasDelPeriodo.forEach(fecha => {
          const idx = DATOS_BRUTOS.fechas.indexOf(fecha);
          if (idx >= 0) {
            sumaPeriodo += dataEstado[idx] || 0;
          }
        });
        
        sumaFila += sumaPeriodo;
        const numClase = estado === 'Calificado' ? 'calificado' : '';
        html += `<td class="numero ${numClase}">${sumaPeriodo}</td>`;
      });
      
      html += `<td class="numero" style="font-weight: 600; color: #fff;">${sumaFila}</td>`;
      fila.innerHTML = html;
      tbody.appendChild(fila);
    });

    const filaTotal = document.createElement('tr');
    filaTotal.className = 'total-row';
    let htmlTotal = '<td class="label-cell"><strong>TOTAL</strong></td>';
    
    periodosParaTabla.forEach((periodo) => {
      const fechasDelPeriodo = Array.isArray(periodo) ? periodo : [periodo];
      let suma = 0;
      
      fechasDelPeriodo.forEach(fecha => {
        const idx = DATOS_BRUTOS.fechas.indexOf(fecha);
        if (idx >= 0) {
          Object.keys(DATOS_BRUTOS.data[key]).forEach(estado => {
            suma += DATOS_BRUTOS.data[key][estado][idx] || 0;
          });
        }
      });
      
      htmlTotal += `<td>${suma}</td>`;
    });
    
    let totalGeneral = 0;
    periodosParaTabla.forEach((periodo) => {
      const fechasDelPeriodo = Array.isArray(periodo) ? periodo : [periodo];
      fechasDelPeriodo.forEach(fecha => {
        const idx = DATOS_BRUTOS.fechas.indexOf(fecha);
        if (idx >= 0) {
          Object.keys(DATOS_BRUTOS.data[key]).forEach(estado => {
            totalGeneral += DATOS_BRUTOS.data[key][estado][idx] || 0;
          });
        }
      });
    });
    
    htmlTotal += `<td>${totalGeneral}</td>`;
    filaTotal.innerHTML = htmlTotal;
    tbody.appendChild(filaTotal);
  });
}

function actualizarDashboard() {
  construirTablas();
}

function resetear() {
  document.getElementById('granularidad').value = 'por_dia';
  document.getElementById('fuente').value = '';
  document.getElementById('subfuente').value = '';
  document.getElementById('subfuente').disabled = true;
  cambiarGranularidad();
}

document.addEventListener('DOMContentLoaded', () => {
  inicializar();
});
